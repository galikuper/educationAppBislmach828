<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <!-- <script src="code.js" type="text/javascript"></script> -->
    <title>אתר חינוך ביסל"ח - לו"ז אירועים</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Hebrew:wght@100..900&display=swap"
        rel="stylesheet">

</head>

<body dir="rtl">
    <img src="./assets/left logos.png" alt="logos" id="left-logos" />
    <img src="./assets/right logos.png" alt="logos" id="right-logos" />

    <img src="./assets/arrow.png" alt="return button" id="arrow" />

    <div id="calendar-page-content">
        <img src="./assets/Title.png" alt='אתר חינוך ביסל"ח' id="title-small" />

        <div class="calendar-container">
            <p id="current-calendar-nav"></p>
            <div id="calendar-nav-container">
                <button id="monthly-btn" class="selected-calendar-btn">חודשי</button>
                <button id="weekly-btn">שבועי</button>
            </div>

            <div class="calendar-background">
                <img src='./assets/monthTitles/April.png' alt="month name" id="month-title" />
                <p id="week-title"></p>
                <div id="calendar"></div>
            </div>

        </div>
    </div>
    </div>
    </div>

    <div id="cover" style="display: none;">
        <div id="popup-container">
            <div id="event-popups">
                <img src="./assets/X.png" alt="X" id="x" />
            </div>
        </div>
    </div>
     <script src="code.js"></script>
</body>

</html>
